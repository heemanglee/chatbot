name: Auto bump submodules

on:
  schedule:
    - cron: "*/10 * * * *"   # 10분마다 (GitHub Actions cron은 부하 시 지연될 수 있음)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout parent repo with submodules
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SUBMODULE_PAT }}
          submodules: recursive
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect submodule updates
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          cd backend
          OLD_BE=$(git rev-parse HEAD)
          git fetch origin main
          git checkout origin/main
          NEW_BE=$(git rev-parse HEAD)
          cd ..

          cd frontend
          OLD_FE=$(git rev-parse HEAD)
          git fetch origin main
          git checkout origin/main
          NEW_FE=$(git rev-parse HEAD)
          cd ..

          BE_CHANGED=n; [ "$OLD_BE" != "$NEW_BE" ] && BE_CHANGED=y
          FE_CHANGED=n; [ "$OLD_FE" != "$NEW_FE" ] && FE_CHANGED=y

          if [ "$BE_CHANGED" = n ] && [ "$FE_CHANGED" = n ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No submodule updates detected."
            exit 0
          fi

          if [ "$BE_CHANGED" = y ] && [ "$FE_CHANGED" = y ]; then
            SUBJECT="chore(submodule): bump backend, frontend to latest origin/main"
            BODY=$'- backend  '"${OLD_BE:0:7}..${NEW_BE:0:7}"$'\n- frontend '"${OLD_FE:0:7}..${NEW_FE:0:7}"
            BRANCH="chore/auto-bump-submodules"
          elif [ "$BE_CHANGED" = y ]; then
            SUBJECT="chore(backend): bump submodule to latest origin/main"
            BODY="${OLD_BE:0:7}..${NEW_BE:0:7}"
            BRANCH="chore/auto-bump-backend"
          else
            SUBJECT="chore(frontend): bump submodule to latest origin/main"
            BODY="${OLD_FE:0:7}..${NEW_FE:0:7}"
            BRANCH="chore/auto-bump-frontend"
          fi

          {
            echo "skip=false"
            echo "subject=$SUBJECT"
            echo "branch=$BRANCH"
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.bump.outputs.skip != 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SUBMODULE_PAT }}
          branch: ${{ steps.bump.outputs.branch }}
          delete-branch: true
          add-paths: |
            backend
            frontend
          title: ${{ steps.bump.outputs.subject }}
          commit-message: |
            ${{ steps.bump.outputs.subject }}

            ${{ steps.bump.outputs.body }}
          body: |
            Automated submodule pointer bump.

            ${{ steps.bump.outputs.body }}

            ---

            > Generated by `.github/workflows/auto-submodule-bump.yml`.

      - name: Enable auto-merge (with fallback to immediate merge)
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.SUBMODULE_PAT }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          gh pr merge --auto --squash --delete-branch "$PR_NUMBER" \
            || gh pr merge --squash --delete-branch "$PR_NUMBER"
